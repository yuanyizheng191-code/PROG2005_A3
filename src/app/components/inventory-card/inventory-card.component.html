<ion-card>
  <ion-card-header>
    <ion-card-title>
      {{ item.itemName }}
      <ion-badge *ngIf="isFeatured()" color="tertiary" class="featured-badge">
        Featured
      </ion-badge>
    </ion-card-title>
    <ion-card-subtitle *ngIf="item.itemId">
      ID: {{ item.itemId }}
    </ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    <ion-item lines="none">
      <ion-icon name="pricetag-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Category</p>
        <h3>{{ item.category }}</h3>
      </ion-label>
    </ion-item>

    <ion-item lines="none">
      <ion-icon name="cube-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Quantity</p>
        <h3>{{ item.quantity }}</h3>
      </ion-label>
    </ion-item>

    <ion-item lines="none">
      <ion-icon name="cash-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Price</p>
        <h3>${{ item.price }}</h3>
      </ion-label>
    </ion-item>

    <ion-item lines="none">
      <ion-icon name="business-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Supplier</p>
        <h3>{{ item.supplierName }}</h3>
      </ion-label>
    </ion-item>

    <ion-item lines="none">
      <ion-badge [color]="getStatusColor(item.stockStatus)">
        {{ item.stockStatus }}
      </ion-badge>
    </ion-item>

    <div *ngIf="item.specialNote" class="special-note">
      <ion-icon name="document-text-outline" slot="start" color="medium"></ion-icon>
      <p>{{ item.specialNote }}</p>
    </div>
  </ion-card-content>
</ion-card>
