<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar [(ngModel)]="searchTerm" (ionInput)="search()"></ion-searchbar>
  <ion-spinner *ngIf="loading" class="ion-text-center" style="display:block;margin:2rem auto"></ion-spinner>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let item of filteredList">
      <ion-label>
        <h2>{{ item.item_name }}</h2>
        <p>Category: {{ item.category }}</p>
        <p>Qty: {{ item.quantity }}</p>
        <p>Price: ${{ item.price }}</p>
        <p>Status: {{ item.stock_status }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
