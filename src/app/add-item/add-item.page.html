<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Add Inventory</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input label="Item Name" [(ngModel)]="item_name" required></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Category" [(ngModel)]="category"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Quantity" [(ngModel)]="quantity" type="number"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Price" [(ngModel)]="price" type="number"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Supplier" [(ngModel)]="supplier_name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Stock Status" [(ngModel)]="stock_status"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Featured (0/1)" [(ngModel)]="featured_item" type="number"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Special Note" [(ngModel)]="special_note"></ion-input>
    </ion-item>
  </ion-list>

  <ion-button expand="full" (click)="addItem()" class="ion-margin-top">
    Add New Item
  </ion-button>
</ion-content>
